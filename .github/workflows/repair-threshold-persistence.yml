name: Repair threshold persistence

on:
  push:
    paths:
      - .github/workflows/repair-threshold-persistence.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply focused repair
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/traffic_alert.py')
          content = path.read_text(encoding='utf-8')
          old = '''            alerted.add(threshold)

    state["alerted"] = sorted(alerted)
    save_json_atomic(STATE_PATH, state)
'''
          new = '''            alerted.add(threshold)
            # Persist immediately after each successful notification so a later
            # Telegram failure cannot cause this threshold to be sent again.
            state["alerted"] = sorted(alerted)
            save_json_atomic(STATE_PATH, state)

    state["alerted"] = sorted(alerted)
    save_json_atomic(STATE_PATH, state)
'''
          if old not in content:
              raise SystemExit('Target block not found or already changed')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Add regression test
        run: |
          cat > tests/test_threshold_persistence.py <<'PY'
          import importlib.util
          import json
          import sys
          import tempfile
          import unittest
          from pathlib import Path
          from unittest.mock import patch

          MODULE_PATH = Path(__file__).parents[1] / 'src' / 'traffic_alert.py'
          SPEC = importlib.util.spec_from_file_location('traffic_alert_persistence', MODULE_PATH)
          MODULE = importlib.util.module_from_spec(SPEC)
          sys.modules[SPEC.name] = MODULE
          assert SPEC.loader is not None
          SPEC.loader.exec_module(MODULE)


          class ThresholdPersistenceTests(unittest.TestCase):
              def test_successful_threshold_is_saved_before_later_notification_failure(self):
                  config = {
                      'server_name': 'test-vps',
                      'interface': 'eth0',
                      'quota_gb': 100,
                      'reset_day': 1,
                      'timezone': 'UTC',
                      'initial_used_gb': 0,
                      'traffic_mode': 'total',
                      'thresholds': [70, 80, 90],
                      'notify_cycle_reset': False,
                      'telegram': {'bot_token': 'token', 'chat_id': 'chat'},
                  }

                  cycle_start, _ = MODULE.cycle_bounds(MODULE.datetime.now(), 1)

                  with tempfile.TemporaryDirectory() as directory:
                      state_path = Path(directory) / 'state.json'
                      state_path.write_text(
                          json.dumps(
                              {
                                  'cycle_id': cycle_start.isoformat(),
                                  'last_total_bytes': 0,
                                  'used_bytes': 0,
                                  'alerted': [],
                                  'last_check': '',
                              }
                          ),
                          encoding='utf-8',
                      )

                      calls = []

                      def fake_send(_config, message):
                          calls.append(message)
                          if 'reached 80%' in message:
                              raise MODULE.MonitorError('simulated Telegram failure')

                      with (
                          patch.object(MODULE, 'STATE_PATH', state_path),
                          patch.object(
                              MODULE,
                              'read_vnstat',
                              return_value=MODULE.TrafficCounters(
                                  rx=81 * MODULE.DECIMAL_GB,
                                  tx=0,
                              ),
                          ),
                          patch.object(MODULE, 'send_telegram', side_effect=fake_send),
                      ):
                          with self.assertRaises(MODULE.MonitorError):
                              MODULE.run_check(config)

                      saved = json.loads(state_path.read_text(encoding='utf-8'))
                      self.assertEqual(saved['alerted'], [70])
                      self.assertEqual(len(calls), 2)


          if __name__ == '__main__':
              unittest.main()
          PY

      - name: Validate
        run: |
          python3 -m py_compile src/traffic_alert.py
          python3 -m unittest discover -s tests -v

      - name: Remove one-time workflow
        run: rm .github/workflows/repair-threshold-persistence.yml

      - name: Commit repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/traffic_alert.py tests/test_threshold_persistence.py .github/workflows/repair-threshold-persistence.yml
          git commit -m "Persist successful threshold alerts immediately"
          git push
